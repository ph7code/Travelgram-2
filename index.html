<html lang="PT-BR">
<head>

  <title>Travelgram</title>
  <link rel="stylesheet" href="index.css">

    <img src="/assets/Logo (1).svg" alt="logo-travelgram">

      <a class="desktop-only" href="#">
        Explorar
      </a>
      <a class="desktop-only" href="#">
        minhas viagens
      </a>

    <main>
      <img src="/assets/Profile pic (2).png" alt="">

        <h1>Isabela Torres</h1>

    <ul role="list">
